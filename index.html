<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ремонт компьютеров в Севастополе и ноутбуков — Сервисный центр ReanimaTech</title>
<meta name="description" content="Профессиональный ремонт компьютеров, ноутбуков и сборка ПК в Севастополе. Компьютерный мастер с выездом и ремонт в СЦ. Диагностика 0₽, гарантия. Рейтинг 5.0 (200+ отзывов). Звоните!">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #1F4FAA;
    --blue-dark: #122F66;
    --blue-deep: #0A1838;
    --orange: #F26522;
    --orange-soft: #FF8845;
    --bg: #FAFAF7;
    --ink: #0A0E1A;
    --muted: #6B7280;
    --line: #E5E7EB;
    --card: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Manrope', sans-serif;
    background-color: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
  }
  .accent { color: var(--orange); }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background-color: var(--orange);
    color: #FFFFFF;
    font-weight: 700;
    padding: 16px 32px;
    border-radius: 8px;
    text-decoration: none;
    transition: background-color 0.2s, transform 0.1s;
    font-size: 16px;
    cursor: pointer;
    border: none;
  }
  .btn:hover { background-color: var(--orange-soft); }
  .btn:active { transform: scale(0.98); }
  
  .btn-outline {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background-color: transparent;
    color: var(--ink);
    font-weight: 600;
    padding: 14px 28px;
    border-radius: 8px;
    text-decoration: none;
    border: 2px solid var(--line);
    transition: border-color 0.2s, background-color 0.2s;
    font-size: 15px;
  }
  .btn-outline:hover {
    border-color: var(--ink);
    background-color: rgba(0,0,0,0.02);
  }

  .section-title {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 48px;
  }
  @media(max-width: 768px) {
    .section-title { font-size: 28px; margin-bottom: 32px; }
  }

  /* ============ HEADER ============ */
  header {
    background-color: rgba(250, 250, 247, 0.8);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    border-bottom: 1px solid var(--line);
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
  }
  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo::before {
    content: '';
    display: inline-block;
    width: 12px;
    height: 12px;
    background-color: var(--orange);
    border-radius: 2px;
  }
  .header-contacts {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .header-phone {
    font-weight: 700;
    color: var(--ink);
    text-decoration: none;
    font-size: 16px;
  }
  .header-phone:hover { color: var(--orange); }
  
  @media(max-width: 600px) {
    .header-contacts .btn-outline { display: none; }
  }

  /* ============ HERO ============ */
  .hero {
    padding: 160px 0 80px 0;
    background: radial-gradient(circle at 80% 20%, rgba(31, 79, 170, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(242, 101, 34, 0.03) 0%, transparent 50%);
  }
  .hero-inner {
    max-width: 800px;
    margin: 0 auto;
    text-align: center;
  }
  .hero h1 {
    font-size: 56px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 24px;
  }
  .hero-p {
    font-size: 20px;
    color: var(--muted);
    margin-bottom: 40px;
    font-weight: 500;
  }
  .hero-actions {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 64px;
  }
  
  @media(max-width: 768px) {
    .hero { padding: 120px 0 60px 0; }
    .hero h1 { font-size: 36px; }
    .hero-p { font-size: 16px; margin-bottom: 32px; }
    .hero-actions { flex-direction: column; width: 100%; }
    .hero-actions .btn, .hero-actions .btn-outline { width: 100%; }
  }

  /* Trust Platforms */
  .trust-box {
    background-color: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 24px;
    display: flex;
    align-items: center;
    justify-content: space-around;
    gap: 24px;
  }
  .platform {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .platform-name {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .platform-name.avito { color: #9ACD32; }
  .platform-name.yandex { color: #E31E24; }
  .rating-val {
    font-size: 24px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 2px;
  }
  .rating-stars {
    color: #FFB800;
    font-size: 14px;
    margin-bottom: 4px;
  }
  .reviews-count {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }
  .trust-divider {
    width: 1px;
    height: 60px;
    background-color: var(--line);
  }
  @media(max-width: 600px) {
    .trust-box { flex-direction: column; gap: 32px; }
    .trust-divider { display: none; }
  }

  /* ============ SERVICES ============ */
  .services {
    padding: 80px 0;
    border-top: 1px solid var(--line);
  }
  .services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 24px;
  }
  .service-card {
    background-color: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 32px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: border-color 0.2s;
  }
  .service-card:hover { border-color: var(--muted); }
  .service-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  .service-card h3 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }
  .service-card p {
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 24px;
    flex-grow: 1;
  }
  .service-price-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-top: 1px dashed var(--line);
    padding-top: 16px;
  }
  .price-label {
    font-size: 14px;
    color: var(--muted);
    font-weight: 500;
  }
  .price-value {
    font-size: 20px;
    font-weight: 800;
  }

  /* ============ WHY US ============ */
  .why {
    padding: 80px 0;
    background-color: var(--blue-deep);
    color: #FFFFFF;
  }
  .why .section-title { color: #FFFFFF; }
  .why-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 32px;
  }
  .why-card {
    display: flex;
    flex-direction: column;
  }
  .why-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: var(--orange);
    font-weight: 700;
    margin-bottom: 16px;
  }
  .why-card h3 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .why-card p {
    color: rgba(255,255,255,0.7);
    font-size: 15px;
  }

  /* ============ PRICES ============ */
  .prices { padding: 80px 0; }
  .price-table-box {
    background-color: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 40px;
  }
  .price-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 1px solid var(--line);
  }
  .price-row:last-child { border-bottom: none; }
  .price-name { font-weight: 600; font-size: 16px; }
  .price-cost { font-weight: 800; font-size: 16px; white-space: nowrap; margin-left: 16px;}
